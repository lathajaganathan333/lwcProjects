<template>
  <lightning-card
    title="Participants for this Training"
    icon-name="utility:people"
  >
    <template if:true={isLoading}>
      <lightning-spinner
        alternative-text="Loading"
        size="medium"
      ></lightning-spinner>
    </template>
    <div class="slds-p-around_small">
      <lightning-datatable
        key-field="Id"
        data={participants}
        columns={columns}
        onsave={handleSave}
        oncancel={handleCancel}
        draft-values={draftValues}
        hide-checkbox-column
      >
      </lightning-datatable>
    </div>
  </lightning-card>
</template>
